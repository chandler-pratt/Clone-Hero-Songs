loading_phrase = The band requested that the music video for "45" be removed from MTV broadcast because the lyrics "the barrel of a .45" and "ashes of another life" were removed from the chorus and the title card of the video referred to the song by the MTV-originated title "Staring Down..." Singer Brent Smith felt the editing blurred the song's message and MTV was hypocritical since they had played other unedited videos. Smith believed that if they did not wish to play the song as it was written, they should never have broadcast it. Though the edited version of the video was aired a few times without the artists' consent, the song was eventually pulled from the airwaves. - Wikipedia
